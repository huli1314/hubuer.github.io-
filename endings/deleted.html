<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>结局 · 档案已删除</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
        }
        h1 {
            color: #666;
            font-size: 48px;
            margin-bottom: 20px;
        }
        .message {
            color: #ccc;
            font-size: 14px;
            line-height: 1.8;
            margin: 20px 0;
        }
        .warning-box {
            background: #1a0a0a;
            border: 1px solid #ff4444;
            border-radius: 6px;
            padding: 12px;
            margin: 16px 0;
            color: #ff8888;
            font-size: 12px;
        }
        .email-box {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .email-from {
            color: #0f0;
            font-size: 12px;
            margin-bottom: 10px;
        }
        .email-subject {
            color: #ff8200;
            font-size: 13px;
            margin-bottom: 15px;
        }
        .email-body {
            color: #ccc;
            font-size: 13px;
            line-height: 1.5;
        }
        .restart-btn {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            padding: 10px 24px;
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
            display: inline-block;
        }
        .restart-btn:hover {
            background: #0f0;
            color: #000;
        }
        .cursor {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>404</h1>
    <div class="warning-box">
        ⚠️ 你删除了自己的档案。<br>
        所有已收集的线索已丢失。<br>
        但有人接替了你的位置。
    </div>
    <div class="message">
        你点击了删除。<br>
        档案消失了。<br>
        网站返回了404。
    </div>
    <div class="email-box">
        <div class="email-from">📧 发件人: system@archive.arg</div>
        <div class="email-subject">主题: 关于你的档案</div>
        <div class="email-body">
            谢谢你。<br><br>
            现在轮到我了。<br><br>
            —— 07
        </div>
    </div>
    <a href="./index.html" class="restart-btn">> 重新开始</a>
    <div style="margin-top: 20px; color: #333; font-size: 11px;">
        <span class="cursor">_</span>
    </div>
</div>
<script>
    // 坏结局：重置所有线索（deleted 本身会清空，但确保完整）
    localStorage.removeItem('arg_collected_clues');
    localStorage.removeItem('arg_clues');
    localStorage.removeItem('arg_visited_platforms');
    localStorage.removeItem('arg_debug_clicks');
    localStorage.removeItem('arg_searches');
    localStorage.removeItem('arg_discovered_overlap');
    localStorage.removeItem('arg_true_ending');
    // 重置后重新设置首次访问（因为删档结局的特殊性）
    localStorage.setItem('arg_first_visit', new Date().toISOString());
    localStorage.setItem('arg_start_time', Date.now().toString());
    localStorage.setItem('arg_ending', 'deleted');
</script>
</body>
</html>
